{% extends "base.html" %}
{% block content %}

<div id="confirm-panel">
    <div class="text-center mb-4">
        <h2 style="font-size: 26px; font-weight: 700; letter-spacing: -0.625px; line-height: 1.23; color: var(--color-text-primary);">You have a Secret Message!</h2>
        <p class="subtitle" style="margin-top: 8px;">Click the envelope to open it.</p>
    </div>

    <div class="envelope-scene">
        <div class="envelope-wrapper" id="envelope-wrapper" tabindex="0" role="button" aria-label="Click to open secret envelope">
            <div class="envelope">
                <div class="envelope-inner"></div>

                <div class="envelope-lines">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="letter" id="secret-letter">
                    <div style="text-align: center; margin-bottom: 8px;">
                        <span class="badge badge-danger">Burn After Reading</span>
                    </div>

                    <div class="meta-info" style="margin: 8px 0; padding: 8px; font-size: 12px;">
                        <p>Created: <span class="time-created" data-time="{{ msg.created_at }}"></span></p>
                        <p>Expires: <span class="time-expires" data-time="{{ msg.expires_at }}"></span></p>
                    </div>

                    {% if msg.has_password %}
                    <div class="form-group text-left mt-2">
                        <label for="view-password" style="font-size: 12px; font-weight: 500;">Password Required:</label>
                        <input type="password" id="view-password" placeholder="Enter password" style="padding: 6px 8px; font-size: 14px;">
                    </div>
                    {% endif %}

                    <button class="btn btn-primary btn-block mt-4" id="btn-view" data-id="{{ msg.id }}" data-has-password="{{ 'true' if msg.has_password else 'false' }}">
                        <span class="btn-text">View Secret</span>
                    </button>

                    <div id="view-error" class="error-msg hidden" style="padding: 6px; font-size: 12px; margin-top: 8px;"></div>
                </div>

                <div class="envelope-fold"></div>

                <div class="envelope-flap">
                    <div class="envelope-flap-face"></div>
                </div>

                <div class="wax-seal">
                    <div class="wax-seal-circle">
                        <span class="wax-seal-text">S</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
