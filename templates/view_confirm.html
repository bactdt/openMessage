{% extends "base.html" %}
{% block content %}

<div class="glass-panel text-center" id="confirm-panel">
    <div class="icon-circle warning-icon">
        <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" class="css-i6dzq1"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
    </div>
    
    <div class="panel-header">
        <h2>Read Secret Message?</h2>
        <p class="warning-text">This message will self-destruct immediately after viewing. You cannot view it again.</p>
    </div>
    
    <div class="meta-info">
        <p>Created: <span class="time-created" data-time="{{ msg.created_at }}"></span></p>
        <p>Expires: <span class="time-expires" data-time="{{ msg.expires_at }}"></span></p>
    </div>
    
    {% if msg.has_password %}
    <div class="form-group text-left mt-6">
        <label for="view-password">This secret is password protected</label>
        <input type="password" id="view-password" placeholder="Enter password to unlock">
    </div>
    {% endif %}
    
    <button class="btn btn-primary btn-block mt-6" id="btn-view" data-id="{{ msg.id }}" data-has-password="{{ 'true' if msg.has_password else 'false' }}">
        <span class="btn-text">View Secret</span>
    </button>
    
    <div id="view-error" class="error-msg hidden"></div>
</div>

{% endblock %}
