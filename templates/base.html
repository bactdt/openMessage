<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMessage - One-Time Secret</title>
    <meta name="description" content="Send secure, view-once, self-destructing messages. No database, end-to-end encrypted.">

    <meta name="openmessage-v2-e2e" content="{{ 'enabled' if flags and flags.v2_e2e_enabled else 'disabled' }}">

    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">

    <link rel="stylesheet" href="/static/css/style.css">

    <script src="/static/js/theme-init.js"></script>
</head>
<body>
    <div class="bg-orbs">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-row">
                <a href="/" class="logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                    OpenMessage
                </a>
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
            <p class="subtitle">Secure, view-once, self-destructing messages.</p>
        </header>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>

        <footer class="app-footer">
            <p>End-to-End Secure · No Database · Burn After Reading</p>
            <p style="margin-top: 8px;">
                <a href="https://github.com/bactdt/openMessage" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    View on GitHub
                </a>
            </p>
        </footer>
    </div>

    <script src="/static/vendor/marked/marked.min.js"></script>

    <script defer src="/static/vendor/katex/katex.min.js"></script>
    <script defer src="/static/vendor/katex/contrib/auto-render.min.js"></script>

    <script src="/static/vendor/dompurify/purify.min.js"></script>

    <script src="/static/js/main.js"></script>
</body>
</html>
