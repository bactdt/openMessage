name: Build Standalone App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: openMessage-linux-x64.tar.gz
            bin_name: openMessage
          - os: macos-latest
            archive_name: openMessage-macos-x64.tar.gz
            bin_name: openMessage
          - os: windows-latest
            archive_name: openMessage-windows-x64.zip
            bin_name: openMessage.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller --clean --noconfirm openMessage.spec

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: mkdir -p release && tar -czf "release/${{ matrix.archive_name }}" -C dist "${{ matrix.bin_name }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: New-Item -ItemType Directory -Path release -Force | Out-Null; Compress-Archive -Path "dist\${{ matrix.bin_name }}" -DestinationPath "release\${{ matrix.archive_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: release/${{ matrix.archive_name }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openMessage-*
          merge-multiple: true
          path: release-assets

      - name: Publish continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          prerelease: true
          make_latest: false
          body: |
            Automated multi-platform build from `${{ github.sha }}`.
            Triggered by push to `main`.
          files: release-assets/*
